<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oaker Local Chat</title>
    <link rel="stylesheet" href="/styles.css?v=19" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Chat controls">
        <div class="sidebar-header">
          <div class="brand">
            <div class="brand-mark" aria-hidden="true">O</div>
            <div class="brand-copy">
              <div class="brand-title">Oaker</div>
              <div class="brand-subtitle">Local Ollama chat</div>
            </div>
          </div>
          <button class="sidebar-toggle" id="sidebarToggleButton" type="button" aria-label="Collapse sidebar" aria-expanded="true">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <rect x="4" y="5" width="16" height="14" rx="2" />
              <path d="M10 5v14" />
            </svg>
          </button>
        </div>

        <button class="primary-action" id="newChatButton" type="button" aria-label="New chat">
          <svg class="new-chat-icon" aria-hidden="true" viewBox="0 0 24 24">
            <path d="M12 5v14" />
            <path d="M5 12h14" />
          </svg>
          <span>New chat</span>
        </button>

        <section class="history-panel" aria-label="Conversations">
          <div class="section-title">Conversations</div>
          <div class="conversation-list" id="conversationList"></div>
        </section>

        <div class="sidebar-bottom">
          <div class="bottom-row">
            <div class="connection-card" id="connectionCard">
              <div class="connection-dot" aria-hidden="true"></div>
              <div>
                <div id="connectionTitle">Checking Ollama</div>
                <div id="connectionDetail">http://127.0.0.1:11434</div>
              </div>
            </div>
            <button class="settings-gear" id="settingsButton" type="button" aria-label="Settings">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z" />
                <path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.04.04a2.16 2.16 0 0 1-3.05 3.05l-.04-.04a1.8 1.8 0 0 0-1.98-.36 1.8 1.8 0 0 0-1.08 1.65V21.4a2.16 2.16 0 0 1-4.32 0v-.08a1.8 1.8 0 0 0-1.08-1.65 1.8 1.8 0 0 0-1.98.36l-.04.04a2.16 2.16 0 0 1-3.05-3.05l.04-.04A1.8 1.8 0 0 0 4.6 15a1.8 1.8 0 0 0-1.65-1.08H2.86a2.16 2.16 0 0 1 0-4.32h.08A1.8 1.8 0 0 0 4.6 8.52a1.8 1.8 0 0 0-.36-1.98l-.04-.04a2.16 2.16 0 0 1 3.05-3.05l.04.04a1.8 1.8 0 0 0 1.98.36A1.8 1.8 0 0 0 10.35 2.2v-.08a2.16 2.16 0 0 1 4.32 0v.08a1.8 1.8 0 0 0 1.08 1.65 1.8 1.8 0 0 0 1.98-.36l.04-.04a2.16 2.16 0 0 1 3.05 3.05l-.04.04a1.8 1.8 0 0 0-.36 1.98A1.8 1.8 0 0 0 22.07 9.6h.08a2.16 2.16 0 0 1 0 4.32h-.08A1.8 1.8 0 0 0 19.4 15Z" />
              </svg>
            </button>
          </div>
        </div>
      </aside>

      <main class="chat-area">
        <section class="messages" id="messages" aria-live="polite"></section>

        <form class="composer" id="composer">
          <textarea
            id="promptInput"
            aria-label="Message"
            placeholder="Ask a local model anything..."
            rows="1"
            spellcheck="true"
          ></textarea>
          <div class="composer-footer">
            <div class="model-picker" id="modelPicker">
              <button class="model-trigger" id="modelButton" type="button" aria-expanded="false" aria-haspopup="listbox">
                <span class="model-status-dot" aria-hidden="true"></span>
                <span class="model-name" id="modelLabel">No models found</span>
                <svg class="chevron-icon" aria-hidden="true" viewBox="0 0 24 24">
                  <path d="m7 10 5 5 5-5" />
                </svg>
              </button>
              <div class="model-popover" id="modelPopover">
                <div class="model-popover-header">
                  <span>Models</span>
                  <button class="model-refresh-button" id="refreshModelsButton" type="button" aria-label="Refresh models">
                    <svg aria-hidden="true" viewBox="0 0 24 24">
                      <path d="M21 12a9 9 0 0 1-15.2 6.5M3 12A9 9 0 0 1 18.2 5.5" />
                      <path d="M21 4v6h-6" />
                      <path d="M3 20v-6h6" />
                    </svg>
                  </button>
                </div>
                <div class="model-list" id="modelList" role="listbox" aria-label="Available models"></div>
              </div>
            </div>
            <div class="composer-tools">
              <button class="web-toggle" id="webSearchButton" type="button" aria-label="Toggle web search" aria-pressed="false">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="9" />
                  <path d="M3.6 9h16.8" />
                  <path d="M3.6 15h16.8" />
                  <path d="M12 3a13.7 13.7 0 0 1 0 18" />
                  <path d="M12 3a13.7 13.7 0 0 0 0 18" />
                </svg>
              </button>
              <button class="deep-research-toggle" id="deepResearchButton" type="button" aria-label="Toggle deep research" aria-pressed="false">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M4 19.5V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v14.5" />
                  <path d="M8 7h8" />
                  <path d="M8 11h5" />
                  <path d="M6 21h12" />
                  <path d="M14 15h5" />
                  <path d="m17 12 3 3-3 3" />
                </svg>
              </button>
              <button class="send-button" id="sendButton" type="submit" aria-label="Send message">
                <svg class="send-icon" aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M12 19V5" />
                  <path d="m5 12 7-7 7 7" />
                </svg>
                <svg class="stop-icon" aria-hidden="true" viewBox="0 0 24 24">
                  <rect x="7" y="7" width="10" height="10" rx="1.5" />
                </svg>
              </button>
            </div>
          </div>
        </form>
      </main>
    </div>

    <dialog class="settings-dialog" id="settingsDialog" aria-labelledby="settingsTitle">
      <div class="settings-panel">
        <header class="settings-header">
          <div>
            <div class="chat-kicker">Local behavior</div>
            <h2 id="settingsTitle">Settings</h2>
          </div>
          <button class="icon-button" id="settingsCloseButton" type="button" aria-label="Close settings">&times;</button>
        </header>

        <section class="settings-section" aria-label="Behavior style">
          <div class="setting-copy row-copy">
            <div>
              <div class="field-label">Style</div>
              <p>Choose a default behavior or open Custom for exact controls.</p>
            </div>
          </div>
          <div class="preset-grid" id="presetGrid" role="radiogroup" aria-label="Behavior style"></div>
          <div class="custom-controls" id="customBehaviorControls" hidden>
            <label class="field-label" for="temperatureRange">Temperature</label>
            <div class="range-row">
              <input id="temperatureRange" min="0" max="2" step="0.1" type="range" value="0.7" />
              <output id="temperatureValue" for="temperatureRange">0.7</output>
            </div>
            <label class="field-label" for="systemPrompt">System prompt</label>
            <textarea
              id="systemPrompt"
              spellcheck="true"
              rows="7"
            >You are a thoughtful local assistant. Be concise, practical, and clear.</textarea>
          </div>
        </section>

        <section class="settings-section" aria-label="Memories">
          <div class="setting-copy row-copy">
            <div>
              <label class="field-label" for="memoryToggle">Memories</label>
              <p>Learned automatically from your chats and saved locally.</p>
            </div>
            <label class="switch">
              <input id="memoryToggle" type="checkbox" />
              <span></span>
            </label>
          </div>
          <div class="memory-list" id="memoryList"></div>
          <button class="quiet-button danger clear-memories" id="clearMemoriesButton" type="button">Clear memories</button>
        </section>
      </div>
    </dialog>

    <dialog class="graph-dialog" id="graphDialog" aria-labelledby="graphTitle">
      <div class="graph-panel">
        <header class="settings-header">
          <div>
            <div class="chat-kicker">Branch graph</div>
            <h2 id="graphTitle">Family graph</h2>
          </div>
          <button class="icon-button" id="graphCloseButton" type="button" aria-label="Close graph">&times;</button>
        </header>
        <div class="graph-list" id="graphList"></div>
      </div>
    </dialog>

    <script src="/app.js?v=25" type="module"></script>
  </body>
</html>
